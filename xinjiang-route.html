// Zoom day function
const zoomKeys=[
null,
['乌鲁木齐','赛里木湖'],
['赛里木湖','伊宁'],
['伊宁','特克斯','喀拉峻'],
['特克斯','昭苏','夏塔'],
['昭苏','那拉提'],
['那拉提','巴音布鲁克'],
['巴音布鲁克','阿克苏'],
null
];

function zoomDay(i){
    const keys=zoomKeys[i];
    if(!keys){
        const r=routes[i];if(!r)return;
        const pts=r.p.filter(p=>p[1]<100);
        if(pts.length>0) map.fitBounds(L.latLngBounds(pts),{padding:[50,50,50,50],maxZoom:10});
        return;
    }
    const pts=keys.map(k=>P[k]).filter(p=>p&&p[1]<100);
    if(pts.length>0) map.fitBounds(L.latLngBounds(pts),{padding:[50,50,50,50],maxZoom:10});
}
